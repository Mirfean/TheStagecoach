name: Build Godot Project

on:
  push: {}
  pull_request: {}

jobs:
  Godot:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: ["Linux", "Windows Desktop"]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Export
        run: |
          docker run --rm -v $(pwd):/project barichello/godot-ci:4.6.2 /bin/bash -c "
          mkdir -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.6.2.stable ~/.local/share/godot/export_templates/4.6.2.stable
          cd /project
          godot --headless --export-debug '${{ matrix.platform }}' ./build/${{ matrix.platform }}
          "
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Client - ${{ matrix.platform }}
          path: build/
