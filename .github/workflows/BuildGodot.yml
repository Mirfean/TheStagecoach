name: Build Godot Project

on:
  push: {}
  pull_request: {}

jobs:
  Godot:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: ["Linux", "Windows Desktop"]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Export
        run: |
          docker run --rm -v $(pwd):/project barichello/godot-ci:4.6.2 /bin/bash -c "
          set -e
          export DEBIAN_FRONTEND=noninteractive
          # Install missing display/font libraries (some Godot builds attempt to load them)
          apt-get update -qq && apt-get install -y --no-install-recommends \
            libfontconfig1 libx11-6 libwayland-client0 libxrandr2 libxinerama1 libxcursor1 libxi6 libxcb1 || true
          mkdir -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.6.2.stable ~/.local/share/godot/export_templates/4.6.2.stable || true
          cd /project
          mkdir -p './build/${{ matrix.platform }}'
          # Use export preset filename (export_presets.cfg) by not passing explicit output
          godot --headless --export-debug '${{ matrix.platform }}'
          "
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Client - ${{ matrix.platform }}
          path: build/
