name: Build Godot Project

on:
  push: {}
  pull_request: {}

jobs:
  Godot:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: ["Linux", "Windows Desktop"]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Build
        id: build
        uses: abarichello/godot-ci@4.6.2-stable
        with:
          godot-version: 4.6.2
          export-preset: ${{ matrix.platform }}
          build-type: debug
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Client - ${{ matrix.platform }}
          path: ${{ steps.build.outputs.build-path }}
